name: Secret Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for Hardcoded Secrets
        run: |
          ! grep -R "password=" . --exclude-dir=.git || exit 1
          ! grep -R "apikey=" . --exclude-dir=.git || exit 1
