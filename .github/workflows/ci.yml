name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore SecurePipelineDemo.sln

      - name: Build
        run: dotnet build SecurePipelineDemo.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test SecurePipelineDemo.sln --configuration Release --no-build
